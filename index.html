<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retriev.AI — RAG Document Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
      --border: #2a2a3a; --border2: #383850;
      --text: #e8e8f0; --text2: #9090a8; --text3: #5a5a72;
      --accent: #6c63ff; --accent2: #8b7fff;
      --accent-glow: rgba(108,99,255,0.15); --accent-glow2: rgba(108,99,255,0.08);
      --cache: #00d4a0; --cache-bg: rgba(0,212,160,0.1);
      --error: #ff4d6d; --shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    body.light {
      --bg: #f4f4f8; --surface: #ffffff; --surface2: #f0f0f6;
      --border: #dddde8; --border2: #c8c8d8;
      --text: #12121e; --text2: #52526a; --text3: #9898b0;
      --accent-glow: rgba(108,99,255,0.1); --accent-glow2: rgba(108,99,255,0.05);
      --shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    body { background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); transition: background 0.3s, color 0.3s; min-height: 100vh; }

    .app { max-width: 960px; margin: 0 auto; padding: 0 20px; min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #a78bfa); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-dot { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .badge-version { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; }
    .theme-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow2); }

    .main { display: flex; flex-direction: column; gap: 24px; padding-bottom: 40px; flex: 1; }

    /* UPLOAD */
    .upload-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: block; }
    .upload-zone { border: 2px dashed var(--border); border-radius: 14px; padding: 40px 24px; text-align: center; cursor: pointer; transition: all 0.25s; background: var(--surface); position: relative; overflow: hidden; }
    .upload-zone::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, var(--accent-glow2), transparent 70%); pointer-events: none; }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: var(--surface2); box-shadow: 0 0 0 4px var(--accent-glow); }
    .upload-zone.uploaded { border-style: solid; border-color: var(--accent); background: var(--accent-glow2); cursor: default; }
    .upload-icon-wrap { width: 52px; height: 52px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; transition: all 0.25s; }
    .upload-zone:hover .upload-icon-wrap, .upload-zone.dragover .upload-icon-wrap { background: var(--accent-glow); border-color: var(--accent); }
    .upload-zone.uploaded .upload-icon-wrap { background: rgba(0,212,160,0.12); border-color: var(--cache); }
    .upload-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .upload-sub { font-size: 13px; color: var(--text2); }
    .upload-filename { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--cache); font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
    .upload-change { font-size: 12px; margin-top: 8px; cursor: pointer; text-decoration: underline; background: none; border: none; color: var(--accent2); font-family: 'Syne', sans-serif; display: block; margin: 8px auto 0; }
    .upload-change:hover { opacity: 0.8; }
    .uploading-bar { margin-top: 16px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .uploading-fill { height: 100%; width: 40%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 2px; animation: slide 1.2s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

    .error-bar { margin-top: 10px; padding: 10px 14px; background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.35); border-radius: 10px; color: var(--error); font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }

    /* DIVIDER */
    .divider { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 12px; font-family: 'DM Mono', monospace; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* CHAT */
    .chat-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); transition: opacity 0.3s; }
    .chat-panel.disabled { opacity: 0.45; pointer-events: none; }
    .chat-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface2); }
    .chat-header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
    .chat-panel.disabled .chat-header-dot { background: var(--text3); box-shadow: none; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .chat-header-title { font-size: 13px; font-weight: 600; }
    .chat-header-sub { font-size: 12px; color: var(--text2); margin-left: auto; font-family: 'DM Mono', monospace; }

    .messages { min-height: 320px; max-height: 480px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .empty-state { margin: auto; text-align: center; color: var(--text3); padding: 40px 0; }
    .empty-icon { width: 48px; height: 48px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .empty-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .empty-sub { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .msg.user .msg-avatar { background: linear-gradient(135deg, var(--accent), #a78bfa); }
    .msg.ai .msg-avatar { background: var(--surface2); border: 1px solid var(--border2); }
    .msg-body { max-width: 75%; display: flex; flex-direction: column; gap: 6px; }
    .msg.user .msg-body { align-items: flex-end; }
    .msg-bubble { padding: 11px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .msg.user .msg-bubble { background: var(--accent); color: #fff; border-radius: 12px 4px 12px 12px; }
    .msg.ai .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; color: var(--text); }
    .msg-meta { display: flex; align-items: center; gap: 6px; }
    .cache-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--cache); background: var(--cache-bg); border: 1px solid rgba(0,212,160,0.25); padding: 2px 7px; border-radius: 4px; letter-spacing: 0.04em; }
    .msg-time { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }

    .typing-bubble { display: flex; align-items: center; gap: 5px; padding: 14px; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-6px);} }

    .chat-input-area { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: var(--surface2); }
    .input-wrap { flex: 1; display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 0 12px; gap: 8px; transition: border-color 0.2s, box-shadow 0.2s; }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .chat-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; padding: 11px 0; }
    .chat-input::placeholder { color: var(--text3); }
    .send-btn { width: 38px; height: 38px; border-radius: 9px; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .send-btn:hover:not(:disabled) { background: var(--accent2); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .hint-bar { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; padding: 10px; border-top: 1px solid var(--border); }

    .page-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--accent2);
      padding: 2px 8px;
      border-radius: 4px;
      transition: all 0.2s;
      cursor: help;
      display: inline-block;
    }
    .page-badge:hover { background: var(--accent-glow); border-color: var(--accent); }
    .sources-list { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    .cursor { display: inline-block; animation: blink 0.7s step-end infinite; color: var(--accent); margin-left: 1px; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }

    svg { display: inline-block; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </div>
        Retriev<span class="logo-dot">.</span>AI
      </div>
      <div class="header-right">
        <span class="badge-version">v1.0 · RAG</span>
        <button class="theme-btn" id="themeBtn" title="Toggle theme">
          <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
      </div>
    </header>

    <main class="main">
      <!-- UPLOAD -->
      <section>
        <span class="upload-label">01 — Document Source</span>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" hidden accept=".pdf,.docx,.txt" />
          <div class="upload-icon-wrap" id="uploadIconWrap">
            <svg id="uploadIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          </div>
          <div class="upload-title" id="uploadTitle">Drop your document here</div>
          <div class="upload-sub" id="uploadSub">PDF, DOCX, TXT · or <span style="color:var(--accent)">browse files</span></div>
          <div class="uploading-bar" id="uploadingBar" style="display:none"><div class="uploading-fill"></div></div>
          <button class="upload-change" id="uploadChange" style="display:none">↩ Replace document</button>
        </div>
        <div class="error-bar" id="errorBar" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          <span id="errorText"></span>
        </div>
      </section>

      <div class="divider">02 — Ask anything</div>

      <!-- CHAT -->
      <div class="chat-panel disabled" id="chatPanel">
        <div class="chat-header">
          <div class="chat-header-dot" id="chatDot"></div>
          <span class="chat-header-title">Document Chat</span>
          <span class="chat-header-sub" id="chatSub">awaiting document</span>
        </div>

        <div class="messages" id="messages">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/></svg>
            </div>
            <div class="empty-text">Ready to assist</div>
            <div class="empty-sub" id="emptySubText">Upload a document to begin</div>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            <input class="chat-input" id="chatInput" placeholder="Upload a document first" disabled />
          </div>
          <button class="send-btn" id="sendBtn" disabled>
            <svg id="sendIcon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          </button>
        </div>

        <div class="hint-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--cache)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
          Cache hits shown with badge · Enter to send
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = "https://rag-document-assistant-xszh.onrender.com"

    // State
    let fileId = null;
    let isUploading = false;
    let isLoading = false;
    let isDark = true;

    // Elements
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const uploadTitle = document.getElementById('uploadTitle');
    const uploadSub = document.getElementById('uploadSub');
    const uploadIconWrap = document.getElementById('uploadIconWrap');
    const uploadingBar = document.getElementById('uploadingBar');
    const uploadChange = document.getElementById('uploadChange');
    const errorBar = document.getElementById('errorBar');
    const errorText = document.getElementById('errorText');
    const chatPanel = document.getElementById('chatPanel');
    const chatSub = document.getElementById('chatSub');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const emptySubText = document.getElementById('emptySubText');
    const themeBtn = document.getElementById('themeBtn');

    // Icons HTML
    const iconCheck = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--cache)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>`;
    const iconSpinner = `<svg class="spin" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
    const iconUpload = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>`;
    const iconSend = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>`;
    const iconSpinSend = `<svg class="spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;

    function fmt(d) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function showError(msg) {
      errorText.innerHTML = `<strong>Upload failed — </strong>${msg}`;
      errorBar.style.display = 'flex';
    }

    function hideError() { errorBar.style.display = 'none'; }

    function setUploadState(state, filename) {
      if (state === 'idle') {
        uploadZone.className = 'upload-zone';
        uploadIconWrap.innerHTML = iconUpload;
        uploadTitle.textContent = 'Drop your document here';
        uploadSub.innerHTML = `PDF, DOCX, TXT · or <span style="color:var(--accent)">browse files</span>`;
        uploadingBar.style.display = 'none';
        uploadChange.style.display = 'none';
        uploadZone.style.cursor = 'pointer';
      } else if (state === 'uploading') {
        uploadZone.className = 'upload-zone';
        uploadIconWrap.innerHTML = iconSpinner;
        uploadTitle.textContent = 'Uploading…';
        uploadSub.innerHTML = `<span style="font-family:'DM Mono',monospace;font-size:12px">${filename}</span>`;
        uploadingBar.style.display = 'block';
        uploadChange.style.display = 'none';
      } else if (state === 'done') {
        uploadZone.className = 'upload-zone uploaded';
        uploadIconWrap.innerHTML = iconCheck;
        uploadTitle.textContent = 'Document Ready';
        uploadSub.innerHTML = `<span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--cache);display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
          ${filename}
        </span>`;
        uploadingBar.style.display = 'none';
        uploadChange.style.display = 'block';
        uploadZone.style.cursor = 'default';
      }
    }

    function enableChat() {
      chatPanel.classList.remove('disabled');
      chatInput.disabled = false;
      chatInput.placeholder = 'Ask about your document…';
      chatSub.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>${fileId.slice(0,8)}…`;
      const sub = document.getElementById('emptySubText');
      if (sub) sub.textContent = 'Ask a question about your document';
    }

    async function handleFile(file) {
      if (!file) return;
      hideError();
      setUploadState('uploading', file.name);
      isUploading = true;
      fileId = null;

      // DEBUG: show step-by-step on page
      const dbg = document.createElement('div');
      dbg.id = 'debugLog';
      dbg.style = 'position:fixed;bottom:10px;right:10px;background:#1a1a2e;border:2px solid #6c63ff;color:#e8e8f0;padding:14px;border-radius:10px;font-family:monospace;font-size:12px;z-index:9999;max-width:400px;line-height:1.8';
      dbg.innerHTML = '🔵 Step 1: handleFile called<br>📄 File: ' + file.name;
      document.body.appendChild(dbg);

      try {
        dbg.innerHTML += '<br>🔵 Step 2: Sending fetch to ' + API_BASE + '/upload';
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: fd });
        dbg.innerHTML += '<br>🔵 Step 3: Got HTTP ' + res.status;
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`Server responded ${res.status}: ${txt}`);
        }
        const data = await res.json();
        dbg.innerHTML += '<br>🟢 Step 4: JSON = ' + JSON.stringify(data);
        if (!data.file_id) throw new Error('No file_id in response: ' + JSON.stringify(data));
        fileId = data.file_id;
        dbg.innerHTML += '<br>🟢 Step 5: fileId set, enabling chat...';
        setUploadState('done', file.name);
        enableChat();
        dbg.innerHTML += '<br>✅ DONE — chat should be enabled now';
        setTimeout(() => { const d = document.getElementById('debugLog'); if(d) d.remove(); }, 5000);
      } catch (e) {
        dbg.innerHTML += '<br>🔴 ERROR: ' + e.message;
        console.error('Upload error:', e);
        const isNetwork = e instanceof TypeError && e.message.toLowerCase().includes('fetch');
        showError(isNetwork
          ? `Cannot reach backend at ${API_BASE}. Is your FastAPI server running?`
          : e.message);
        setUploadState('idle');
      } finally {
        isUploading = false;
        fileInput.value = '';
      }
    }

    function appendMessage(role, text, source, time, sources) {
      const emptyEl = document.getElementById('emptyState');
      if (emptyEl) emptyEl.style.display = 'none';

      const isUser = role === 'user';
      const timeFmt = fmt(time || new Date());
      const cacheHtml = source === 'cache'
        ? `<span class="cache-badge"><svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg> cache hit</span>`
        : '';

      const sourcesHtml = (!isUser && sources && sources.length > 0)
        ? `<div class="sources-list">
            <span style="font-size:11px;color:var(--text3);font-weight:600;font-family:'DM Mono',monospace;">SOURCES:</span>
            ${sources.map(p => `<span class="page-badge" title="Jump to page ${p}">Page ${p}</span>`).join('')}
           </div>`
        : '';

      const userAvatar = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
      const aiAvatar = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/></svg>`;

      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `
        <div class="msg-avatar">${isUser ? userAvatar : aiAvatar}</div>
        <div class="msg-body">
          <div class="msg-bubble">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
          ${sourcesHtml}
          <div class="msg-meta">${cacheHtml}<span class="msg-time">${timeFmt}</span></div>
        </div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showTyping() {
      if (emptyState) emptyState.style.display = 'none';
      const div = document.createElement('div');
      div.className = 'msg ai';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/></svg></div>
        <div class="msg-body"><div class="msg-bubble" style="padding:0"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typingIndicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      const q = chatInput.value.trim();
      if (!q || !fileId || isLoading) return;

      appendMessage('user', q, null, new Date());
      chatInput.value = '';
      isLoading = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = iconSpinSend;
      showTyping();

      try {
        const res = await fetch(`${API_BASE}/ask/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q, file_id: fileId })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let msgDiv = null;
        let bubbleEl = null;
        let metaEl = null;
        let source = 'llm';
        let sources = [];
        let fullText = '';

        hideTyping();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const jsonStr = line.slice(6).trim();
            if (!jsonStr) continue;
            try {
              const evt = JSON.parse(jsonStr);

              if (evt.type === 'meta') {
                source = evt.source;
                sources = evt.sources || [];
                // Create the message bubble now
                msgDiv = document.createElement('div');
                msgDiv.className = 'msg ai';
                const aiAvatar = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/></svg>`;
                msgDiv.innerHTML = `
                  <div class="msg-avatar">${aiAvatar}</div>
                  <div class="msg-body">
                    <div class="msg-bubble" id="streamBubble"></div>
                    <div class="sources-row"></div>
                    <div class="msg-meta"><span class="msg-time">${fmt(new Date())}</span></div>
                  </div>`;
                messages.appendChild(msgDiv);
                bubbleEl = msgDiv.querySelector('#streamBubble');
                metaEl = msgDiv.querySelector('.sources-row');

              } else if (evt.type === 'token') {
                if (!msgDiv) {
                  // fallback if meta wasn't received
                  msgDiv = document.createElement('div');
                  msgDiv.className = 'msg ai';
                  const aiAvatar = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/></svg>`;
                  msgDiv.innerHTML = `<div class="msg-avatar">${aiAvatar}</div><div class="msg-body"><div class="msg-bubble" id="streamBubble"></div><div class="sources-row"></div><div class="msg-meta"><span class="msg-time">${fmt(new Date())}</span></div></div>`;
                  messages.appendChild(msgDiv);
                  bubbleEl = msgDiv.querySelector('#streamBubble');
                  metaEl = msgDiv.querySelector('.sources-row');
                }
                fullText += evt.text;
                bubbleEl.innerHTML = fullText.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
                // Add blinking cursor while streaming
                bubbleEl.innerHTML += '<span class="cursor">▊</span>';
                messages.scrollTop = messages.scrollHeight;

              } else if (evt.type === 'done') {
                // Remove cursor
                if (bubbleEl) bubbleEl.innerHTML = fullText.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
                // Add sources + cache badge
                if (metaEl) {
                  const cacheHtml = source === 'cache'
                    ? `<span class="cache-badge"><svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg> cache hit</span>` : '';
                  const sourcesHtml = sources.length > 0
                    ? `<div class="sources-list"><span style="font-size:11px;color:var(--text3);font-weight:600;font-family:'DM Mono',monospace;">SOURCES:</span>${sources.map(p => `<span class="page-badge" title="Page ${p}">Page ${p}</span>`).join('')}</div>` : '';
                  metaEl.innerHTML = sourcesHtml;
                  const metaRow = msgDiv.querySelector('.msg-meta');
                  if (metaRow) metaRow.innerHTML = cacheHtml + `<span class="msg-time">${fmt(new Date())}</span>`;
                }

              } else if (evt.type === 'error') {
                hideTyping();
                appendMessage('ai', evt.text, 'error', new Date(), []);
              }
            } catch(e) { /* skip bad JSON */ }
          }
        }
      } catch (e) {
        hideTyping();
        appendMessage('ai', 'Something went wrong. Please check your backend connection.', 'error', new Date(), []);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        sendBtn.innerHTML = iconSend;
        chatInput.focus();
      }
    }

    // Events
    uploadZone.addEventListener('click', () => { if (!fileId && !isUploading) fileInput.click(); });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    uploadChange.addEventListener('click', e => {
      e.stopPropagation();
      fileId = null;
      setUploadState('idle');
      chatPanel.classList.add('disabled');
      chatInput.disabled = true;
      chatInput.placeholder = 'Upload a document first';
      chatSub.textContent = 'awaiting document';
      messages.innerHTML = `<div class="empty-state" id="emptyState"><div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/></svg></div><div class="empty-text">Ready to assist</div><div class="empty-sub" id="emptySubText">Upload a document to begin</div></div>`;
      setTimeout(() => fileInput.click(), 50);
    });
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); if (!fileId) uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault(); uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    chatInput.addEventListener('input', () => { sendBtn.disabled = !chatInput.value.trim() || isLoading || !fileId; });

    themeBtn.addEventListener('click', () => {
      isDark = !isDark;
      document.body.classList.toggle('light', !isDark);
      themeBtn.innerHTML = isDark
        ? `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>`
        : `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
    });
  </script>
</body>
</html>
